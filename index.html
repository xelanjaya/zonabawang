    <style>

        /* 4. LAYOUT RESPONSIVE */
        .layout-panel {

            display: flex; flex-direction: column; gap: 2rem;

            .links-box { gap: 1.5rem; }

            .footer-mobile { display: none; }
            .footer-desktop { display: block; width: 100%; margin-top: auto; padding-top: 1.5rem; border-top: 3px solid #000; }
        }

        /* 5. DESAIN BUBBLE WARNA PLATFORM */
        .manga-btn {
            border: 3px solid #000; box-shadow: 5px 5px 0px #000; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex; align-items: stretch; min-height: 3.5rem; text-decoration: none; overflow: hidden; 
        }
        .manga-btn:hover:not(:disabled) { transform: translate(-3px, -3px); box-shadow: 8px 8px 0px #000; }
        .manga-btn:active:not(:disabled) { transform: translate(5px, 5px); box-shadow: 0px 0px 0px #000; }
        .manga-btn:disabled { cursor: not-allowed; opacity: 0.7; filter: grayscale(100%); }

        .manga-icon { width: 4rem; display: flex; align-items: center; justify-content: center; border-right: 3px solid #000; transition: background-color 0.2s ease, color 0.2s ease; }

        .manga-label { transition: transform 0.2s cubic-bezier(0.25, 1, 0.5, 1); }
        .manga-btn:hover .manga-label { transform: translateX(-12px); }
        
        .manga-arrow {
            position: absolute; right: 1.5rem; opacity: 0; transform: translateX(-15px);
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); font-size: 1rem;
        }
        .manga-btn:hover .manga-arrow { opacity: 1; transform: translateX(0); }

        .transform { transform: scale(var(--tw-scale-x, 1)) scale(var(--tw-scale-y, 1)); }

        /* ================= ANIMASI FULL TOMBOL CLOSE ================= */

        .manga-close-btn:active { transform: rotate(180deg) scale(0.9) translate(4px, 4px); box-shadow: 0px 0px 0px #000; transition: all 0.1s ease; }

    <!-- ================= JAVASCRIPT UI LOGIC ================= -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            
            // Logic Analytics Tracking
            const links = document.querySelectorAll('.track-link');
            links.forEach(link => {
                link.addEventListener('click', function(e) {
                    const platformName = this.getAttribute('data-nama');
                    const urlTujuan = this.getAttribute('href') || 'Modal_Terbuka';
                    if(typeof gtag === 'function') {
                        gtag('event', 'klik_tautan', {
                            'event_category': 'Link In Bio',
                            'event_label': platformName,
                            'url_tujuan': urlTujuan
                        });
                    }
                });
            });

            // Logic Modal Form
            const modal = document.getElementById('contactModal');
            const modalContent = document.getElementById('modalContent');
            const openBtn = document.getElementById('openContactModal');
            const closeBtn = document.getElementById('closeContactModal');

            openBtn.addEventListener('click', () => {
                modal.classList.remove('hidden');
                setTimeout(() => {
                    modal.style.opacity = '1';
                    modalContent.style.transform = 'scale(1)';
                }, 10);
            });

            const closeModal = () => {
                modal.style.opacity = '0';
                modalContent.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    modal.classList.add('hidden');
                }, 300);
            };

            closeBtn.addEventListener('click', closeModal);
            modal.addEventListener('click', (e) => {
                if (e.target === modal) closeModal();
            });

        });
    </script>
